name: Ingest papers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate paper digest
        env:
          X_USER_ID: ${{ secrets.X_USER_ID }}
          X_USER_ACCESS_TOKEN: ${{ secrets.X_USER_ACCESS_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          MAX_PAPERS: "180"
        run: node scripts/ingest-papers.js

      - name: Commit updated digest
        run: |
          if git diff --quiet -- papers/papers.json papers/twitter-feed.json; then
            echo "No digest changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add papers/papers.json
          if [ -f papers/twitter-feed.json ]; then
            git add papers/twitter-feed.json
          fi
          git commit -m "Update paper digest"
          git push
